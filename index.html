<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website của tôi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }
        header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        nav a:hover {
            color: yellow;
        }
        .container {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>🌐 Website của tôi</h1>
    <p>Chào mừng bạn đến với trang web đầu tiên!</p>
</header>

<nav>
    <a href="#">Trang chủ</a>
    <a href="#">Giới thiệu</a>
    <a href="#">Liên hệ</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Giới thiệu</h2>
        <p>Đây là website đơn giản được deploy bằng Netlify 🚀</p>
    </div>

    <div class="card">
        <h2>Thông tin</h2>
        <p>Bạn có thể chỉnh sửa nội dung này theo ý muốn.</p>
    </div>
</div>

<footer>
    <p>© 2026 - Website của bạn</p>
</footer>

</body>
</html>
